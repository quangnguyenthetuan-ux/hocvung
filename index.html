<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashVocab Ultimate 2026</title>
    <style>
    :root {
        --bg-color: #0f0c29; --card-bg: #242445; --text-color: #ffffff;
        --accent-color: #ffeb3b; --delete-red: #ff4757;
        --confirm-green: #2ed573; --mode-bg: #3a3a6b; --input-dark: #0a0a1f;
    }

    body {
        background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%);
        color: var(--text-color); font-family: 'Segoe UI', sans-serif;
        margin: 0; min-height: 100vh; padding-bottom: 80px; /* Chừa chỗ cho thanh menu dưới */
    }

    /* --- GIAO DIỆN MOBILE: THANH MENU DƯỚI --- */
    .bottom-nav {
        position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
        background: var(--card-bg); display: flex; justify-content: space-around;
        align-items: center; border-top: 1px solid rgba(255,255,255,0.1);
        z-index: 9999; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
    }
    .nav-item {
        display: flex; flex-direction: column; align-items: center;
        color: white; text-decoration: none; font-size: 12px; cursor: pointer;
    }
    .nav-icon { font-size: 24px; margin-bottom: 4px; }

    /* --- TỐI ƯU HEADER CHO MOBILE --- */
    .header-section { padding: 20px 0; width: 100%; display: flex; flex-direction: column; align-items: center; }
    #search-input { width: 85%; padding: 12px 20px; border-radius: 25px; border: none; font-size: 16px; }
    #stats-bar { font-size: 14px; padding: 8px 20px; margin-bottom: 15px; }

    /* --- TỐI ƯU FLASHCARD MAIN --- */
    .main-container { width: 92%; }
    .flash-card-main { padding: 15px; border-radius: 12px; margin-bottom: 10px; }
    .flash-card-main b { font-size: 1.2rem; }

    /* --- TỐI ƯU CHẾ ĐỘ HỌC (FLASHCARD TO) --- */
    .card-box { width: 95%; height: 60vh; max-height: 450px; }
    .card-face { 
        font-size: 10vw; /* Chữ tự co giãn theo chiều rộng màn hình */
        padding: 20px; text-align: center; line-height: 1.2;
    }
    .card-back { font-size: 1.5rem; } /* Nghĩa nhỏ hơn một chút để chứa được định nghĩa */
    
    .game-nav { margin-top: 40px; gap: 15px; }
    .btn-square { width: 65px; height: 65px; font-size: 28px; }

    /* --- TỐI ƯU MODAL (FULL SCREEN TRÊN ĐIỆN THOẠI) --- */
    .modal { width: 100%; height: 100%; border-radius: 0; padding: 20px; box-sizing: border-box; }
    .close-circle { top: 15px; right: 15px; width: 35px; height: 35px; }

    /* --- QUIZ --- */
    .quiz-grid { gap: 10px; width: 100%; }
    .quiz-option { font-size: 1.1rem; padding: 15px; min-height: 80px; }
    .spell-input { font-size: 1.5rem; width: 90%; }

    /* Ẩn icon bên hông cũ */
    .side-icons { display: none; }
</style>
</head>
<body>

    <body>
    <div class="bottom-nav">
        <div class="nav-item" onclick="Modules.UI.closeAll()">
            <span class="nav-icon">🏠</span>

        <div class="nav-item" onclick="Modules.TL.open()">

    <div class="header-section">
        <div id="stats-bar">
            📊 Kho: <span id="total-words-count" style="color: var(--accent-color);">0</span> từ
        </div>

    <div class="header-section">
        <div class="header-section">
    
    <div id="stats-bar">
        📊 Tổng kho: <span id="total-words-count" style="color: var(--accent-color);">0</span> từ vựng
    </div>
    
    <div id="daily-quote" onclick="Modules.Quotes.refresh()"></div>
</div>

        <input type="text" id="search-input" placeholder="Nhập từ vựng..."><button class="icon-import-trigger" onclick="Modules.Import.open()" title="Nhập nhanh từ vựng">📥</button>
        <div id="daily-quote" onclick="Modules.Quotes.refresh()"></div>

    <div id="tl-overlay" class="overlay">
        <div class="modal">
            <button class="close-circle" onclick="Modules.UI.closeAll()">X</button>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button onclick="Modules.TL.sort('date')" class="icon-trigger" style="border-radius:10px; width:auto; padding:0 15px;">📅 Ngày</button>
                <button onclick="Modules.TL.sort('alpha')" class="icon-trigger" style="border-radius:10px; width:auto; padding:0 15px;">A-Z</button>
                <button onclick="Modules.Backup.export()" class="icon-trigger" style="border-radius:10px; width:auto; padding:0 15px; font-size:14px;">Tải về</button>

    <div class="quiz-option" id="opt-0" onclick="Modules.Quiz.checkMC(0)"></div>

    <span style="color:#aaa; border-right: 1px solid #444; padding-right: 15px; margin-right: 5px;">

</div>
            </div>

                <button class="mode-btn" id="btn-retry-failed" onclick="Modules.Quiz.retryFailed()" style="display:none;">Học lại các câu sai 🚩</button>

    <div id="import-overlay" class="overlay">
    <div class="modal">
    <button class="close-circle" onclick="Modules.UI.closeAll()">X</button>
    <h2 style="text-align: center; margin-bottom: 5px;">Siêu nhập liệu (Bulk Import)</h2>
    <p style="font-size: 0.8rem; opacity: 0.6; text-align: center; margin-bottom: 15px;">
        Gợi ý: Dùng <b>\n</b> cho xuống dòng, <b>\s</b> cho dấu cách
    </p>
    
    <textarea id="import-area" placeholder="Ví dụ: hello:xin chào; banana:chuối; apple:táo"></textarea>
    
    <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <span>Dấu ngăn cách <b>các cặp</b>:</span>
            <input type="text" id="import-pair-sep" value=";" style="width: 60px; padding: 5px; text-align: center; border-radius: 5px; border: 1px solid #555; background: #222; color: #fff;">
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <span>Dấu ngăn cách <b>từ và nghĩa</b>:</span>
            <input type="text" id="import-word-sep" value=":" style="width: 60px; padding: 5px; text-align: center; border-radius: 5px; border: 1px solid #555; background: #222; color: #fff;">
        </div>
        <button class="mode-btn" style="width: 100%; padding: 12px; margin-top: 5px;" onclick="Modules.Import.process()">🚀 Bắt đầu nhập liệu</button>
    </div>
</div>
    <script type="module">
        const DB_KEY = 'FLASH_VOCAB_FINAL';
        const DAILY_KEY = 'FLASH_DAILY_DATA';

        // 1. Quản lý dữ liệu (State)
        const State = {
            vocab: JSON.parse(localStorage.getItem(DB_KEY)) || [],
            daily: JSON.parse(localStorage.getItem(DAILY_KEY)) || { date: '', list: [] },
            sortType: 'date',
            sessionPool: [], // Từ vựng đang học
            wrongPool: [],   // Từ làm sai
            idx: 0,          // Vị trí từ hiện tại
            answered: false,
            score: { r: 0, w: 0 }
        };

        // 2. Hệ thống Module
        const Modules = {
            // --- ĐÂY LÀ NƠI BẠN SẼ CHÈN AUDIO ---
            Audio: {
            speak: (text) => {
                const synth = window.speechSynthesis;
                
                // 1. Dọn dẹp: Tắt tiếng cũ đang đọc dở
                synth.cancel();

                // 2. Làm sạch chữ: Bỏ (n), (v), ví dụ... chỉ đọc từ vựng chính
                let cleanText = text.split('|')[0]
                                    .replace(/\(n\)|\(v\)|\(adj\)|\(adv\)/g, '')
                                    .trim();

                const utter = new SpeechSynthesisUtterance(cleanText);

                // 3. CHIẾN THUẬT TÌM GIỌNG: Thử nhiều phương án
                const voices = synth.getVoices();
                
                // Ưu tiên 1: Giọng Google US English (Cực hay)
                // Ưu tiên 2: Bất cứ giọng nào có đuôi en-US (Mỹ)
                // Ưu tiên 3: Bất cứ giọng nào có chữ en- (Anh, Úc, Mỹ...)
                const targetVoice = voices.find(v => v.name.includes('Google US English')) ||
                                   voices.find(v => v.lang === 'en-US') ||
                                   voices.find(v => v.lang.startsWith('en'));

                if (targetVoice) {
                    utter.voice = targetVoice;
                    utter.lang = targetVoice.lang;
                } else {
                    // Nếu vẫn không tìm thấy (thường trên mobile), ép trình duyệt dùng chuẩn en-US
                    utter.lang = 'en-US';
                }

                // 4. Cấu hình độ mượt
                utter.rate = 0.85; // Tốc độ hơi chậm lại để nghe rõ
                utter.pitch = 1;
                
                synth.speak(utter);
                
                // Log để kiểm tra (F12 để xem máy đang dùng giọng gì)
                console.log("Đang đọc bằng giọng:", targetVoice ? targetVoice.name : "Mặc định hệ thống");
            }
        },
            Dictionary: {
            lookup: async (word) => {
                const posSymbol = { "noun": "(n)", "verb": "(v)", "adjective": "(adj)", "adverb": "(adv)" };
                try {
                    // 1. Lấy dữ liệu học thuật (IPA, Định nghĩa Anh-Anh, Ví dụ)
                    const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                    let ipa = "", definitionEn = "", example = "", pos = "";

                    if (dictRes.ok) {
                        const dictData = await dictRes.json();
                        const entry = dictData[0];
                        ipa = entry.phonetic || (entry.phonetics.find(p => p.text)?.text) || "";
                        const firstMeaning = entry.meanings[0];
                        pos = posSymbol[firstMeaning.partOfSpeech] || `(${firstMeaning.partOfSpeech})`;
                        definitionEn = firstMeaning.definitions[0].definition;
                        const hasEx = firstMeaning.definitions.find(d => d.example);
                        if (hasEx) example = hasEx.example;
                    }

                    // 2. Chỉ dịch Từ vựng chính sang tiếng Việt để làm "gốc"
                    const googleUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURI(word)}`;
                    const transRes = await fetch(googleUrl);
                    const transData = await transRes.json();
                    const vietnameseWord = transData[0][0][0].toLowerCase();

                    // 3. Đóng gói: [IPA] // [Nghĩa Việt] // [Định nghĩa Anh-Anh] | Ví dụ: ...
                    let res = `${ipa} // ${pos} ${vietnameseWord}`;
                    if (definitionEn) res += ` // 📖 ${definitionEn}`; // Giữ nguyên tiếng Anh
                    if (example) res += ` | Ví dụ: ${example}`;

                    return res;
                } catch (e) { return null; }
            }
        },
            Import: {
            open: () => {
                document.getElementById('import-overlay').style.display = 'flex';
                document.getElementById('import-area').focus();
            },
            process: () => {
                const rawText = document.getElementById('import-area').value;
                let pairSepInput = document.getElementById('import-pair-sep').value;
                let wordSep = document.getElementById('import-word-sep').value;

                if (!rawText.trim()) return alert("Ô nhập liệu đang trống!");

                // Xử lý thông minh cho dấu ngăn cách các cặp
                let actualPairSep;
                if (pairSepInput.toLowerCase() === '\\n') {
                    // Sử dụng biểu thức chính quy để nhận diện mọi kiểu xuống dòng (Windows/Mac/Linux)
                    actualPairSep = /\r?\n/; 
                } else if (pairSepInput.toLowerCase() === '\\s') {
                    actualPairSep = / +/;
                } else {
                    actualPairSep = pairSepInput;
                }

                // Tách văn bản thành các cặp
                const rawPairs = rawText.split(actualPairSep);
                let countAdded = 0;
                const now = Modules.Utils.getNow();

                rawPairs.forEach(chunk => {
                    const trimmedChunk = chunk.trim();
                    if (!trimmedChunk) return;

                    // Tách từ và nghĩa
                    const parts = trimmedChunk.split(wordSep);
                    if (parts.length >= 2) {
                        const word = parts[0].trim().toLowerCase();
                        // Ghép phần còn lại làm nghĩa (phòng trường hợp nghĩa có chứa dấu phân cách)
                        const meaning = parts.slice(1).join(wordSep).trim();

                        if (word && meaning) {
                            const exists = State.vocab.find(v => v.w === word);
                            if (!exists) {
                                State.vocab.push({ w: word, m: meaning, c: 1, d: now });
                                countAdded++;
                            }
                        }
                    }
                });

                if (countAdded > 0) {
                    Modules.Utils.save();
                    Modules.UI.renderMain();
                    alert(`Thành công! Đã thêm ${countAdded} từ vựng mới.`);
                    Modules.UI.closeAll();
                } else {
                    alert("Không tìm thấy từ mới! Hãy kiểm tra: \n1. Dấu '-' trong ô thiết lập có giống dấu '-' ở trên danh sách không?\n2. Các từ bạn nhập đã có trong kho chưa?");
                }
            }
        },
Utils: {
            save: () => {
        // 1. Lưu vào máy (phòng khi mất mạng)
        localStorage.setItem(DB_KEY, JSON.stringify(State.vocab));
        
        // 2. QUAN TRỌNG: Đẩy danh sách đã xóa/sửa lên Firebase
        if (typeof db !== 'undefined') {
            set(ref(db, 'flash_vocab/'), State.vocab);
            console.log("đã cập nhật thay đổi lên mây!");
        }
    },
            getNow: () => { const d = new Date(); return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`; },
            
            // 1. Hàm fix lỗi "is not a function" bạn vừa gặp
            simplifyDate: (d) => { 
                if(!d || typeof d !== 'string') return ""; 
                const p = d.split('-'); 
                return p.length === 3 ? `${parseInt(p[2])}/${parseInt(p[1])}/${p[0]}` : d; 
            },

            // 2. Hàm hiển thị nghĩa + Cambridge + Định nghĩa Anh-Anh
            formatMeaning: (text, word) => {
                if (!text) return "";
                let html = text;
                
                // Tách Ví dụ (cho xuống dòng màu nhạt)
                if (html.includes('| Ví dụ:')) {
                    const parts = html.split('| Ví dụ:');
                    html = `${parts[0]} <span class="word-example">Ex: ${parts[1]}</span>`;
                }
                
                // Tách các thành phần (IPA, Nghĩa Việt, Định nghĩa Anh) bằng dấu // 
                const segments = html.split(' // ');
                let finalHtml = "";
                segments.forEach(seg => {
                    if (seg.startsWith('/') || seg.startsWith('[')) {
                        finalHtml += `<span class="word-ipa">${seg}</span><br>`;
                    } else if (seg.startsWith('📖')) {
                        finalHtml += `<span class="word-def" style="color: #4ecdc4; font-style: italic; border-left: 2px solid #003366; padding-left: 8px; display: block; margin: 5px 0;">${seg}</span>`;
                    } else {
                        finalHtml += `<b style="font-size: 1rem; color: #fff;">${seg}</b><br>`;
                    }
                });

                // 3. GIỮ LẠI NÚT CAMBRIDGE ĐÂY RỒI!
                if (word) {
                    const camUrl = `https://dictionary.cambridge.org/dictionary/english-vietnamese/${word}`;
                    finalHtml += `<a href="${camUrl}" target="_blank" class="btn-cambridge" style="display: inline-block; margin-top: 8px; padding: 4px 10px; background: #003366; color: white; border-radius: 12px; font-size: 0.7rem; text-decoration: none; border: 1px solid #004488;">🔗 Cambridge Dictionary</a>`;
                }

                return finalHtml;
            },

            // 4. Hàm lấy nghĩa chính để làm bài tập (không lấy ví dụ)
            getMainMeaning: (text) => {
                if (!text) return "";
                const segments = text.split(' // ');
                if (segments.length >= 2) return segments[1].split('|')[0].trim(); 
                return segments[0].split('|')[0].trim();
            }
        },
            UI: {
            // 1. Cập nhật con số tổng ở ngoài thư viện riêng
            updateTotalCount: () => {
                const countElement = document.getElementById('total-words-count');
                if (countElement) {
                    countElement.innerText = State.vocab.length;
                }
            },

            closeAll: () => { 
                document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none'); 
                if (Modules.TO) Modules.TO.reset(); 
            },

            // 2. Hàm vẽ Màn hình chính (Chỉ hiện từ cần học + Tia sét)
            renderMain: () => {
                // Luôn cập nhật tổng số từ trong kho trước
                Modules.UI.updateTotalCount(); 
                
                const box = document.getElementById('reminder-box'); 
                if (!box) return;
                box.innerHTML = '';

                // LỌC ĐÚNG THEO DANH SÁCH HÀNG NGÀY NHƯ BẠN MUỐN
                const list = State.vocab.filter(v => State.daily.list.includes(v.w));
                
                // Nếu danh sách học hôm nay trống, báo để người dùng biết (tránh tưởng lỗi)
                if (list.length === 0) {
                    box.innerHTML = `
                        <div style="text-align:center; padding:20px; opacity:0.5;">
                            Hôm nay chưa có từ nào trong danh sách học.<br>
                            <small>Hãy vào Thư viện để chọn từ!</small>
                        </div>`;
                    return;
                }

                list.forEach(i => {
                    const displayM = Modules.Utils.formatMeaning(i.m, i.w);
                    // Bảo vệ biến i.c (nếu chưa có thì coi là 0) để không lỗi hàm repeat
                    const lightningCount = i.c || 0; 

                    box.innerHTML += `
                        <div class="flash-card-main">
                            <div>
                                <b>${i.w}</b> 
                                <button class="btn-speaker" onclick="Modules.Audio.speak('${i.w}')">🔊</button>
                                <br><small>${displayM}</small>
                            </div>
                            <div style="color:var(--accent-color)">
                                ${'⚡'.repeat(lightningCount)}
                            </div>
                        </div>`;
                });
            }
        },

            TL: {
            open: () => { 
                const el = document.getElementById('tl-overlay');
                if (el) {
                    el.style.display = 'flex'; 
                    Modules.TL.render(); 
                }
            },

            // 1. ĐỘNG CƠ SẮP XẾP: Thực hiện đảo vị trí từ trong State.vocab
            sort: (type) => { 
                if (type === 'alpha' || type === 'az') {
                    // Sắp xếp A-Z
                    State.vocab.sort((a, b) => a.w.localeCompare(b.w));
                } else if (type === 'date') {
                    // Sắp xếp Ngày (Mới nhất lên đầu)
                    State.vocab.sort((a, b) => {
                        const parseDate = (str) => {
                            const p = str.split('/');
                            return new Date(p[2], p[1] - 1, p[0]);
                        };
                        return parseDate(b.d) - parseDate(a.d);
                    });
                }
                // Sau khi xếp xong thì vẽ lại màn hình
                Modules.TL.render(); 
            },

            // 2. HÀM VẼ THƯ VIỆN: Hiện đúng từ, nghĩa và tia sét
            render: () => {
    // 1. Tìm đúng túi chứa (ID vocab-list)
    const listContainer = document.getElementById('vocab-list');
    if (!listContainer) return;
    listContainer.innerHTML = '';

    // 2. Kiểm tra kho trống
    if (State.vocab.length === 0) {
        listContainer.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.5;">Kho từ vựng trống...</div>';
        return;
    }

    // 3. Vẽ danh sách từ vựng
    listContainer.innerHTML = State.vocab.map((i, idx) => {
        const isAdded = State.daily.list.includes(i.w);
        
        // CHÌA KHÓA: Gọi hàm formatMeaning để lấy cả IPA và nút Cambridge
        const displayM = Modules.Utils.formatMeaning(i.m, i.w);

        return `
            <div class="word-row">
                <div class="word-w">
                    ${i.w} <br>
                    <span style="color:var(--accent-color); font-size:0.8rem;">${'⚡'.repeat(i.c || 0)}</span>
                </div>
                <div class="word-colon">:</div>
                <div class="word-m">
                    ${displayM} 
                </div>
                <div class="word-actions">
                    <button onclick="Modules.TL.toggleDaily('${i.w}')" style="background:${isAdded ? '#2ed573' : '#444'}; border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer; white-space:nowrap;">
                        ${isAdded ? 'Đã thêm' : 'Học'}
                    </button>
                    <button onclick="Modules.TL.edit(${idx})" style="background:none; border:none; cursor:pointer;">✏️</button>
                    <button onclick="Modules.TL.del(${idx})" style="background:none; border:none; cursor:pointer;">🗑️</button>
                </div>
            </div>`;
    }).join('');
},

            toggleDaily: (word) => {
                const pos = State.daily.list.indexOf(word);
                if (pos === -1) State.daily.list.push(word);
                else State.daily.list.splice(pos, 1);
                localStorage.setItem(DAILY_KEY, JSON.stringify(State.daily));
                Modules.TL.render();
                Modules.UI.renderMain();
            },

            del: (i) => { 
                if(confirm("Xóa từ này?")) { 
                    State.vocab.splice(i,1); 
                    Modules.Utils.save(); 
                    Modules.TL.render(); 
                    Modules.UI.renderMain(); 
                }
            },

            edit: (i) => { 
                const w = prompt("Sửa từ:", State.vocab[i].w);
                const m = prompt("Sửa nghĩa:", State.vocab[i].m); 
                if(w && m){ 
                    State.vocab[i].w = w; 
                    State.vocab[i].m = m; 
                    Modules.Utils.save(); 
                    Modules.TL.render(); 
                    Modules.UI.renderMain(); 
                }
            }
        },
            TO: {
            open: () => { 
                document.getElementById('to-overlay').style.display = 'flex'; 
                document.getElementById('study-date').value = new Date().toISOString().split('T')[0]; 
            },
            reset: () => { 
                document.getElementById('to-menu').style.display='flex'; 
                document.getElementById('play-f').style.display='none'; 
                document.getElementById('play-q').style.display='none'; 
                document.getElementById('play-end').style.display='none'; 
            },
            start: (mode) => {
                const dt = document.getElementById('study-date').value; 
                if(!dt) return alert("Chọn ngày!");
                State.sessionPool = State.vocab.filter(v => v.d === Modules.Utils.simplifyDate(dt));
                if(State.sessionPool.length === 0) return alert("Không có từ!");
                if(document.getElementById('shuffle-check').checked) State.sessionPool.sort(() => Math.random()-0.5);
                
                State.idx = 0; 
                State.flaggedPool = []; // Reset danh sách đánh dấu mới
                State.wrongPool = []; 
                State.score = {r:0, w:0};
                
                document.getElementById('to-menu').style.display = 'none';
                if(mode === 1) { 
                    document.getElementById('play-f').style.display = 'flex'; 
                    Modules.TO.renderF(); 
                } else { 
                    Modules.Quiz.init(); 
                }
            },
            // --- HÀM RENDER FLASHCARD ĐÃ SỬA LỖI ---
            renderF: () => {
            const i = State.sessionPool[State.idx]; 
            document.getElementById('c-inner').classList.remove('is-flipped');
            
            // 1. Chèn chữ và Nút Loa vào mặt trước
            document.getElementById('txt-fw').innerHTML = `
                ${i.w}
                <button class="btn-speaker-card" onclick="event.stopPropagation(); Modules.Audio.speak('${i.w}')">🔊</button>
            `;
            
            // 2. Chèn nghĩa vào mặt sau
            document.getElementById('txt-fm').innerHTML = Modules.Utils.formatMeaning(i.m);
            
            // 3. Cập nhật tiến độ
            document.getElementById('f-prog').innerText = `${State.idx+1} / ${State.sessionPool.length}`;
            
            // 4. Cập nhật màu nút Cờ
            const isFlagged = State.flaggedPool.some(x => x.w === i.w);
            document.getElementById('flag-btn').classList.toggle('flag-active', isFlagged);

            // 5. TỰ ĐỘNG PHÁT ÂM: Mỗi khi chuyển thẻ máy sẽ tự đọc luôn
            Modules.Audio.speak(i.w);
        },
            moveCard: (d) => { 
                State.idx += d; 
                if(State.idx < 0) State.idx = 0; 
                else if(State.idx >= State.sessionPool.length) Modules.TO.showEnd(1); 
                else Modules.TO.renderF(); 
            },
            flip: () => document.getElementById('c-inner').classList.toggle('is-flipped'),
            addLightning: () => { 
                const i = State.sessionPool[State.idx]; 
                const r = State.vocab.find(x => x.w === i.w); 
                if(r) { r.c++; Modules.Utils.save(); Modules.UI.renderMain(); }
            },
            // --- HÀM BẬT/TẮT CỜ ĐÃ SỬA LỖI ---
            toggleFlag: () => {
                const i = State.sessionPool[State.idx];
                const x = State.flaggedPool.findIndex(f => f.w === i.w);
                if(x === -1) {
                    State.flaggedPool.push(i);
                } else {
                    State.flaggedPool.splice(x, 1);
                }
                Modules.TO.renderF(); // Vẽ lại để cập nhật màu nút
            },
            showEnd: (mode) => { 
                document.getElementById(mode===1?'play-f':'play-q').style.display='none'; 
                document.getElementById('play-end').style.display='flex';
                const btnRetry = document.getElementById('btn-retry-failed');
                
                if(mode === 1) {
                    document.getElementById('end-stat').innerText = `Bạn đã xem hết ${State.sessionPool.length} thẻ.`;
                    btnRetry.innerText = `Học lại từ đã đánh dấu (${State.flaggedPool.length}) 🚩`;
                    btnRetry.style.display = State.flaggedPool.length > 0 ? 'block' : 'none';
                    btnRetry.onclick = () => {
                        State.sessionPool = [...State.flaggedPool];
                        State.flaggedPool = [];
                        State.idx = 0;
                        document.getElementById('play-end').style.display='none';
                        document.getElementById('play-f').style.display='flex';
                        Modules.TO.renderF();
                        Modules.Quiz.clearSession();
                    };
                } else {
                    document.getElementById('end-stat').innerText = `Đúng: ${State.score.r} | Sai: ${State.score.w}`;
                    btnRetry.innerText = `Học lại các câu sai 🚩`;
                    btnRetry.style.display = State.wrongPool.length > 0 ? 'block' : 'none';
                    btnRetry.onclick = () => Modules.Quiz.retryFailed();
                }
            }
        },
            Quiz: {
            // 1. Khởi tạo bài học
            init: () => {
                let qList = [];
                State.idx = 0; State.score = { r: 0, w: 0 }; State.wrongPool = [];
                State.sessionPool.forEach(w => {
                    const pureA = Modules.Utils.getMainMeaning(w.m);
                    // Tạo 3 loại câu hỏi: Anh-Việt, Việt-Anh, và Chính tả
                    qList.push({ t: 'EV', q: w.w, a: pureA, o: w }, 
                               { t: 'VE', q: pureA, a: w.w, o: w }, 
                               { t: 'SP', q: pureA, a: w.w, o: w });
                });
                State.sessionPool = qList.sort(() => Math.random() - 0.5);
                document.getElementById('play-q').style.display = 'flex';
                Modules.Quiz.render();
            },

            // 2. Hiển thị câu hỏi (ĐÃ FIX LỖI TRỘN NGÔN NGỮ)
            render: () => {
                State.answered = false;
                const hintBox = document.getElementById('q-hint');
                const nextBtn = document.getElementById('q-next');
                if (hintBox) { hintBox.style.display = 'none'; hintBox.innerHTML = ''; }
                if (nextBtn) nextBtn.style.display = 'none';

                const cur = State.sessionPool[State.idx];
                document.getElementById('q-text').innerText = cur.q;
                document.getElementById('p-cnt').innerText = `${State.idx + 1} / ${State.sessionPool.length}`;
                if (hintBox) hintBox.innerHTML = `Đúng: <b>${cur.a}</b><br>${Modules.Utils.formatMeaning(cur.o.m, cur.o.w)}`;

                const input = document.getElementById('q-in');
                const mcGrid = document.getElementById('q-mc');
                const spellBox = document.getElementById('q-spell');

                if (cur.t === 'SP') {
                    document.getElementById('q-label').innerText = "VIẾT LẠI CHÍNH TẢ";
                    if (mcGrid) mcGrid.style.display = 'none';
                    if (spellBox) spellBox.style.display = 'block';
                    input.value = ''; setTimeout(() => input.focus(), 50);
                } else {
                    document.getElementById('q-label').innerText = (cur.t === 'EV' ? "CHỌN NGHĨA ĐÚNG" : "CHỌN TỪ ĐÚNG");
                    if (mcGrid) mcGrid.style.display = 'grid';
                    if (spellBox) spellBox.style.display = 'none';
                    document.querySelectorAll('.quiz-option').forEach(btn => btn.className = 'quiz-option');

                    // --- FIX NGÔN NGỮ ĐÁP ÁN NHIỄU ---
                    let opts = [cur.a];
                    let distractors = State.vocab
                        .filter(v => v.w !== cur.o.w)
                        .map(v => cur.t === 'EV' ? Modules.Utils.getMainMeaning(v.m) : v.w) // Nếu hỏi Việt (VE) thì lấy Anh (v.w)
                        .sort(() => Math.random() - 0.5)
                        .slice(0, 3);

                    opts.push(...distractors);
                    while(opts.length < 4) opts.push("---");
                    opts.sort(() => Math.random() - 0.5);
                    
                    for(let i = 0; i < 4; i++) {
                        let b = document.getElementById(`opt-${i}`);
                        if (b) b.innerText = opts[i];
                    }
                }
            },

            // 3. Hàm kiểm tra Chính tả (FIX LỖI NOT A FUNCTION)
            checkSpell: () => {
                if (State.answered) return;
                const input = document.getElementById('q-in');
                const val = input.value.trim().toLowerCase();
                if (!val) return; 

                State.answered = true;
                const cur = State.sessionPool[State.idx];
                if (val === cur.a.toLowerCase()) { input.classList.add('correct'); State.score.r++; }
                else { input.classList.add('wrong'); State.score.w++; State.wrongPool.push(cur); }
                Modules.Quiz.showResult();
            },

            checkMC: (idx) => {
                if (State.answered) return; State.answered = true;
                const cur = State.sessionPool[State.idx];
                const b = document.getElementById(`opt-${idx}`);
                if (b.innerText === cur.a) { b.classList.add('correct'); State.score.r++; }
                else { 
                    b.classList.add('wrong'); State.score.w++; State.wrongPool.push(cur);
                    for(let i=0; i<4; i++) if(document.getElementById(`opt-${i}`).innerText === cur.a) document.getElementById(`opt-${i}`).classList.add('correct');
                }
                Modules.Quiz.showResult();
            },

            showResult: () => {
                document.getElementById('q-hint').style.display = 'block';
                document.getElementById('q-next').style.display = 'block';
                document.getElementById('r-cnt').innerText = State.score.r;
                document.getElementById('w-cnt').innerText = State.score.w;
                Modules.Audio.speak(State.sessionPool[State.idx].o.w);
            },

            next: () => {
                State.idx++;
                if (State.idx >= State.sessionPool.length) Modules.TO.showEnd(2);
                else Modules.Quiz.render();
            },

            retryFailed: () => {
                State.sessionPool = [...State.wrongPool].sort(() => Math.random() - 0.5);
                State.wrongPool = []; State.idx = 0; State.score = { r: 0, w: 0 };
                document.getElementById('play-end').style.display = 'none';
                document.getElementById('play-q').style.display = 'flex';
                Modules.Quiz.render();
            }
        },
            Quotes: {
                list: ["The beautiful thing about learning is that nobody can take it away from you.", "Live as if you were to die tomorrow. Learn as if you were to live forever.", "The expert in anything was once a beginner."],
                refresh: () => document.getElementById('daily-quote').innerText = Modules.Quotes.list[Math.floor(Math.random()*Modules.Quotes.list.length)]
            },

            Backup: {
                export: () => { const b = new Blob([JSON.stringify(State.vocab)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "vocab.json"; a.click(); },
                import: (e) => { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = x => { State.vocab = JSON.parse(x.target.result); Modules.Utils.save(); Modules.UI.renderMain(); alert("Đã nạp!"); }; r.readAsText(f); }
            }
        };

        // 3. Khởi tạo ứng dụng
        window.onload = () => {
            Modules.Quotes.refresh();
            const t = new Date().toDateString();
            if(State.daily.date !== t) {
                const c = State.vocab.filter(i => i.c >= 3).sort(() => Math.random()-0.5);
                State.daily = { date: t, list: c.slice(0,5).map(x => x.w) };
                localStorage.setItem(DAILY_KEY, JSON.stringify(State.daily));
            }
            Modules.UI.renderMain();
        };

        // Xử lý tìm kiếm thông minh và tự động lưu
        document.getElementById('search-input').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const input = e.target;
                const val = input.value.trim().toLowerCase();
                if (!val) return;

                // Kiểm tra xem từ đã có trong thư viện chưa
                const found = State.vocab.find(x => x.w === val);
                if (found) {
                    found.c++;
                    Modules.Utils.save();
                    Modules.UI.renderMain();
                    alert(`Từ "${val}" đã có trong kho.\nNghĩa: ${found.m}\nSố tia sét: ${found.c}`);
                    input.value = '';
                    return;
                }

                // Nếu chưa có -> Bắt đầu tra cứu tự động
                input.classList.add('searching-active');
                input.placeholder = "Đang tra cứu từ điển...";
                input.disabled = true;

                const autoMeaning = await Modules.Dictionary.lookup(val);

                input.classList.remove('searching-active');
                input.placeholder = "Nhập từ vựng...";
                input.disabled = false;
                input.value = '';

                if (autoMeaning) {
                    // Lưu vào thư viện
                    State.vocab.push({ w: val, m: autoMeaning, c: 1, d: Modules.Utils.getNow() });
                    Modules.Utils.save();
                    Modules.UI.renderMain();
                    
                    // Báo lại nghĩa cho người dùng
                    alert(`Đã tìm thấy!\nTừ: ${val}\nNghĩa: ${autoMeaning}`);
                    Modules.Audio.speak(val); // Tự động phát âm luôn cho nóng
                } else {
                    alert(`Từ "${val}" không tồn tại hoặc lỗi mạng!`);
                }
                
                input.focus();
            }
        });

        // Phím tắt bàn phím cho Quiz
        // Bộ lắng nghe phím tắt toàn cục
        // BỘ LẮNG NGHE BÀN PHÍM THÔNG MINH (1, 2, 3, 4 & Enter)
window.addEventListener('keydown', e => {
    // Chỉ hoạt động khi đang mở màn hình Ôn tập (Quiz)
    const quizOverlay = document.getElementById('play-q');
    if (!quizOverlay || quizOverlay.style.display !== 'flex') return;

    const cur = State.sessionPool[State.idx];
    if (!cur) return;

    // TRƯỜNG HỢP 1: CHƯA TRẢ LỜI -> Cho phép dùng phím số 1, 2, 3, 4
    if (!State.answered) {
        // Chỉ áp dụng cho chế độ Trắc nghiệm (không phải Điền từ SP)
        if (cur.t !== 'SP') {
            if (['1', '2', '3', '4'].includes(e.key)) {
                e.preventDefault(); // Ngăn chặn hành động thừa
                const optionIndex = parseInt(e.key) - 1;
                Modules.Quiz.checkMC(optionIndex);
            }
        }
        // Lưu ý: Chế độ SP (Điền từ) đã có hàm checkSpell xử lý Enter riêng trong input
    } 
    
    // TRƯỜNG HỢP 2: ĐÃ TRẢ LỜI XONG -> Nhấn Enter hoặc Mũi tên để sang câu tiếp
    else {
        if (e.key === 'Enter' || e.key === 'ArrowRight') {
            e.preventDefault();
            Modules.Quiz.next();
        }
    }
});
        // Đảm bảo danh sách giọng nói được nạp sẵn khi trình duyệt thay đổi
window.speechSynthesis.onvoiceschanged = () => {
    Modules.Audio.getBestVoice();
};
// Ép trình duyệt nạp danh sách giọng nói ngay khi mở app
if ('speechSynthesis' in window) {

    window.speechSynthesis.getVoices();

    window.speechSynthesis.onvoiceschanged = () => {
        const voices = window.speechSynthesis.getVoices();
        console.log("Hệ thống đã nạp xong " + voices.length + " giọng nói.");

window.addEventListener('keydown', e => {
    const quizOverlay = document.getElementById('play-q');
    if (!quizOverlay || quizOverlay.style.display !== 'flex') return;

    // CHỈ XỬ LÝ PHÍM ENTER CHO CHẾ ĐỘ ĐIỀN TỪ
    if (e.key === 'Enter') {
        e.preventDefault();
        e.stopImmediatePropagation();

        const isSpellMode = document.getElementById('q-spell').style.display === 'block';

        if (!State.answered) {
            // Chỉ khi đang gõ và nhấn Enter thì mới Check
            if (isSpellMode) {
                Modules.Quiz.checkSpell();
            }
        } else {
            // Đã xong câu này thì nhấn Enter mới được sang câu sau
            Modules.Quiz.next();
        }
    }

    // Phím tắt 1, 2, 3, 4 cho trắc nghiệm (Chỉ chạy khi KHÔNG ở chế độ điền từ)
    if (!State.answered && document.getElementById('q-mc').style.display === 'grid') {
        if (['1', '2', '3', '4'].includes(e.key)) {
            Modules.Quiz.checkMC(parseInt(e.key) - 1);
        }
    }
});
