<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashVocab Mobile Pro</title>
    <style>
        :root {
            --bg: #0f0c29; --card: #242445; --text: #ffffff;
            --accent: #ffeb3b; --red: #ff4757; --green: #2ed573;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%);
            color: var(--text); font-family: 'Segoe UI', sans-serif;
            margin: 0; min-height: 100vh; padding-bottom: 80px;
        }

        /* --- GIAO DIỆN HÀNG NGANG (TỪ TRÁI - NGHĨA PHẢI) --- */
        .flash-card-main, .word-row {
            background: var(--card); margin: 10px auto; padding: 15px;
            border-radius: 12px; display: flex; align-items: center;
            width: 92%; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.05);
        }
        .word-left { width: 35%; font-weight: bold; font-size: 1.1rem; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 10px; }
        .meaning-right { width: 65%; padding-left: 12px; font-size: 0.95rem; color: #ccc; }

        /* --- THANH ĐIỀU HƯỚNG DƯỚI --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--card); display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid rgba(255,255,255,0.1); z-index: 9999;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; cursor: pointer; }
        .nav-icon { font-size: 24px; }

        /* --- FLASHCARD 2 MẶT (LẬT ĐỂ XEM) --- */
        .card-box { width: 90%; height: 400px; perspective: 1000px; margin: 20px auto; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 25px; padding: 20px; text-align: center; box-sizing: border-box;
            background: #2d2d5a; border: 2px solid rgba(255,255,255,0.1);
        }
        .card-front { font-size: 3rem; font-weight: bold; }
        .card-back { transform: rotateY(180deg); background: #1e1e3f; font-size: 1.2rem; }

        /* --- NÚT BẤM QUIZ CHO ĐIỆN THOẠI --- */
        .quiz-controls { display: flex; gap: 10px; width: 90%; margin-top: 20px; }
        .btn-action { 
            flex: 1; padding: 15px; border-radius: 12px; border: none; 
            font-weight: bold; font-size: 1rem; cursor: pointer;
        }
        .btn-check { background: var(--green); color: #000; }
        .btn-next { background: var(--accent); color: #000; }

        /* MODAL FULL SCREEN */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; }
        .modal { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .close-btn { align-self: flex-end; padding: 10px 20px; background: var(--red); border-radius: 10px; border: none; color: white; margin-bottom: 20px; }
        
        .spell-input { width: 90%; padding: 15px; font-size: 1.5rem; border-radius: 10px; background: #000; color: #fff; border: 1px solid #444; text-align: center; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin: 20px 0; }
        .quiz-option { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #444; }
        .correct { border-color: var(--green) !important; background: rgba(46, 213, 115, 0.2); }
        .wrong { border-color: var(--red) !important; background: rgba(255, 71, 87, 0.2); }
    </style>
</head>
<body>

    <div class="header-section" style="text-align: center; padding: 20px;">
        <div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 20px; display: inline-block;">
            📊 Kho: <span id="total-words-count" style="color: var(--accent);">0</span> từ
        </div>
        <br><br>
        <input type="text" id="search-input" placeholder="Tìm từ hoặc thêm nhanh..." style="width: 80%; padding: 12px; border-radius: 20px; border: none;">
    </div>

    <div id="reminder-box" class="main-container"></div>

    <div id="tl-overlay" class="overlay">
        <div class="modal">
            <button class="close-btn" onclick="Modules.UI.closeAll()">Đóng X</button>
            <div id="vocab-list"></div>
        </div>
    </div>

    <div id="to-overlay" class="overlay">
        <div class="modal">
            <button class="close-btn" onclick="Modules.UI.closeAll()">Đóng X</button>
            <div id="to-menu" style="text-align: center;">
                <input type="date" id="study-date" style="padding: 10px; border-radius: 10px; margin-bottom: 20px;">
                <button onclick="Modules.TO.start(1)" style="width: 80%; padding: 20px; margin-bottom: 10px; border-radius: 15px; background: var(--card); color: white;">1. Flashcard (Lật mặt)</button>
                <button onclick="Modules.TO.start(2)" style="width: 80%; padding: 20px; border-radius: 15px; background: var(--card); color: white;">2. Bài tập Quiz</button>
            </div>

            <div id="play-f" style="display: none; flex-direction: column; align-items: center;">
                <div class="card-box" onclick="Modules.TO.flip()">
                    <div class="card-inner" id="c-inner">
                        <div class="card-face card-front" id="txt-fw"></div>
                        <div class="card-face card-back" id="txt-fm"></div>
                    </div>
                </div>
                <div style="display: flex; gap: 20px;">
                    <button onclick="Modules.TO.moveCard(-1)" style="font-size: 2rem; background: none; border: none; color: white;">⬅️</button>
                    <button onclick="Modules.TO.moveCard(1)" style="font-size: 2rem; background: none; border: none; color: white;">➡️</button>
                </div>
            </div>

            <div id="play-q" style="display: none; flex-direction: column; align-items: center; width: 100%;">
                <h2 id="q-text" style="color: var(--accent); font-size: 2rem;"></h2>
                <div id="q-mc" class="quiz-grid"></div>
                <div id="q-spell" style="display: none; width: 100%; text-align: center;">
                    <input type="text" id="q-in" class="spell-input" placeholder="Nhập đáp án...">
                    <div class="quiz-controls">
                        <button class="btn-action btn-check" onclick="Modules.Quiz.checkSpell()">KIỂM TRA ✅</button>
                    </div>
                </div>
                <div id="q-result-area" style="display: none; width: 90%; margin-top: 20px; text-align: center;">
                    <p id="q-hint"></p>
                    <button class="btn-action btn-next" onclick="Modules.Quiz.next()">CÂU TIẾP THEO ➡️</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="Modules.UI.closeAll()">
            <span class="nav-icon">🏠</span><span>Trang chủ</span>
        </div>
        <div class="nav-item" onclick="Modules.TL.open()">
            <span class="nav-icon">📖</span><span>Thư viện</span>
        </div>
        <div class="nav-item" onclick="Modules.TO.open()">
            <span class="nav-icon">🎯</span><span>Ôn tập</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const DB_KEY = 'FLASH_VOCAB_FINAL';
        const firebaseConfig = {
            apiKey: "AIzaSyB-dtRxkkhXZ8UTuBNi81tSGf-RHFRVtrw",
            authDomain: "flashvocab-7b7c3.firebaseapp.com",
            databaseURL: "https://flashvocab-7b7c3-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "flashvocab-7b7c3",
            storageBucket: "flashvocab-7b7c3.firebasestorage.app",
            messagingSenderId: "976149522564",
            appId: "1:976149522564:web:f316863c09fd83bc3c3ad1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const State = {
            vocab: [],
            daily: { list: [] },
            idx: 0,
            sessionPool: [],
            answered: false
        };

        const Modules = {
            UI: {
                renderMain: () => {
                    document.getElementById('total-words-count').innerText = State.vocab.length;
                    const box = document.getElementById('reminder-box');
                    box.innerHTML = State.vocab.slice(-5).map(i => `
                        <div class="flash-card-main">
                            <div class="word-left">${i.w}</div>
                            <div class="meaning-right">${i.m.split(' // ')[1] || i.m}</div>
                        </div>
                    `).join('');
                },
                closeAll: () => {
                    document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
                }
            },
            TL: {
                open: () => {
                    Modules.UI.closeAll(); // Tắt ôn tập nếu đang mở
                    document.getElementById('tl-overlay').style.display = 'block';
                    Modules.TL.render();
                },
                render: () => {
                    document.getElementById('vocab-list').innerHTML = State.vocab.map((i, idx) => `
                        <div class="word-row">
                            <div class="word-left">${i.w}</div>
                            <div class="meaning-right">${i.m.split(' // ')[1] || i.m}</div>
                            <button onclick="Modules.TL.del(${idx})">🗑️</button>
                        </div>
                    `).join('');
                },
                del: (idx) => {
                    if(confirm("Xóa từ này?")) {
                        State.vocab.splice(idx, 1);
                        set(ref(db, 'flash_vocab/'), State.vocab);
                    }
                }
            },
            TO: {
                open: () => {
                    Modules.UI.closeAll(); // Tắt thư viện nếu đang mở
                    document.getElementById('to-overlay').style.display = 'block';
                    document.getElementById('to-menu').style.display = 'block';
                    document.getElementById('play-f').style.display = 'none';
                    document.getElementById('play-q').style.display = 'none';
                },
                start: (mode) => {
                    const date = document.getElementById('study-date').value;
                    const formattedDate = date.split('-').reverse().map(x => parseInt(x)).join('/');
                    State.sessionPool = State.vocab.filter(v => v.d === formattedDate);
                    
                    if(State.sessionPool.length === 0) return alert("Ngày này không có từ vựng!");
                    
                    document.getElementById('to-menu').style.display = 'none';
                    State.idx = 0;
                    if(mode === 1) {
                        document.getElementById('play-f').style.display = 'flex';
                        Modules.TO.renderF();
                    } else {
                        document.getElementById('play-q').style.display = 'flex';
                        Modules.Quiz.init();
                    }
                },
                renderF: () => {
                    const i = State.sessionPool[State.idx];
                    document.getElementById('c-inner').classList.remove('is-flipped');
                    document.getElementById('txt-fw').innerText = i.w;
                    document.getElementById('txt-fm').innerHTML = i.m.replace(/\/\/ /g, '<br>');
                },
                flip: () => document.getElementById('c-inner').classList.toggle('is-flipped'),
                moveCard: (d) => {
                    State.idx += d;
                    if(State.idx < 0) State.idx = 0;
                    else if(State.idx >= State.sessionPool.length) alert("Đã hết thẻ!");
                    else Modules.TO.renderF();
                }
            },
            Quiz: {
                init: () => {
                    State.idx = 0;
                    Modules.Quiz.render();
                },
                render: () => {
                    State.answered = false;
                    document.getElementById('q-result-area').style.display = 'none';
                    const cur = State.sessionPool[State.idx];
                    document.getElementById('q-text').innerText = cur.m.split(' // ')[1] || "Tra nghĩa...";
                    
                    document.getElementById('q-mc').style.display = 'none'; // Đơn giản hóa: Dùng điền từ cho mobile
                    document.getElementById('q-spell').style.display = 'block';
                    document.getElementById('q-in').value = '';
                },
                checkSpell: () => {
                    if(State.answered) return;
                    State.answered = true;
                    const cur = State.sessionPool[State.idx];
                    const input = document.getElementById('q-in');
                    if(input.value.trim().toLowerCase() === cur.w.toLowerCase()) {
                        input.style.borderColor = 'var(--green)';
                    } else {
                        input.style.borderColor = 'var(--red)';
                    }
                    document.getElementById('q-hint').innerHTML = `Đáp án đúng: <b style="color:var(--accent)">${cur.w}</b>`;
                    document.getElementById('q-result-area').style.display = 'block';
                },
                next: () => {
                    State.idx++;
                    if(State.idx >= State.sessionPool.length) {
                        alert("Hoàn thành bài tập!");
                        Modules.TO.open();
                    } else {
                        Modules.Quiz.render();
                    }
                }
            }
        };

        onValue(ref(db, 'flash_vocab/'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                State.vocab = data;
                Modules.UI.renderMain();
            }
        });

        window.Modules = Modules;
        window.State = State;
    </script>
</body>
</html>
